<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>下饭猫的秘密基地 | 首页</title>
    <style>
        :root {
            --bg-color: #fbfbfb;     
            --text-primary: #2c2c2c;  
            --text-secondary: #999999;
            --font-stack: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", "Microsoft YaHei", sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-stack);
            line-height: 2; 
            letter-spacing: 0.05em; 
            -webkit-font-smoothing: antialiased;
        }

        @keyframes softFadeIn {
            0% {
                opacity: 0;
                transform: translateY(12px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .container {
            max-width: 680px; 
            margin: 12vh auto 15vh;
            padding: 0 20px;
            animation: softFadeIn 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        header {
            margin-bottom: 80px;
        }

        nav a {
            text-decoration: none;
            color: var(--text-secondary);
            margin-right: 30px;
            font-size: 0.9rem;
            position: relative; 
            padding-bottom: 4px;
            transition: color 0.4s ease;
        }

        nav a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 1px;
            bottom: 0;
            left: 50%;
            background-color: var(--text-primary);
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            transform: translateX(-50%);
        }

        nav a:hover, nav a.active {
            color: var(--text-primary);
        }

        nav a:hover::after, nav a.active::after {
            width: 100%; 
        }

        h1, h2, h3 {
            font-weight: 400;
            margin-bottom: 1.5rem;
        }

        h1 { font-size: 1.8rem; }
        h2 { font-size: 1.4rem; margin-top: 40px; }
        p { margin-bottom: 1.5rem; }

        .post-list li { 
            margin-bottom: 35px; 
            opacity: 0.7; 
            transition: transform 0.4s ease, opacity 0.4s ease;
            cursor: pointer;
        }

        .post-list li:hover {
            opacity: 1; 
            transform: translateX(6px); 
        }

        .post-list h3 {
            margin-bottom: 0.5rem;
            transition: color 0.3s ease;
        }

        .post-list li:hover h3 {
            color: #000; 
        }

        img, video {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 40px 0;
            border-radius: 2px;
            transition: transform 0.6s ease, box-shadow 0.6s ease;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
        }

        img:hover, video:hover {
            transform: scale(1.015); 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06); 
        }

        figcaption {
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: -30px;
            margin-bottom: 40px;
        }

        .profile-section {
            display: flex;
            flex-direction: column;
            align-items: center; 
            justify-content: center;
            margin-top: 15vh; 
            text-align: center;
        }

        .avatar-wrapper {
            width: 160px; 
            height: 160px;
            border-radius: 50%; 
            overflow: hidden; 
            border: 1px solid rgba(0, 0, 0, 0.05);
            transition: transform 0.6s cubic-bezier(0.25, 0.8, 0.25, 1), box-shadow 0.6s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            margin: 0; 
            display: block;
            filter: grayscale(20%);
            transition: filter 0.6s ease;
        }

        .signature-text {
            margin-top: 30px;
            font-size: 1.1rem; 
            font-weight: 300; 
            color: var(--text-primary);
            letter-spacing: 0.2rem; 
        }

        .avatar-wrapper:hover {
            transform: scale(1.03) translateY(-3px); 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08); 
        }

        .avatar-wrapper:hover .avatar-img {
            filter: grayscale(0%); 
        }

        .brand-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 10vh;
        }

        .artistic-type {
            font-family: "Helvetica Neue", Arial, sans-serif;
            font-size: 1.5rem;
            font-weight: 400;
            letter-spacing: 0.6em; 
            margin-left: 0.6em; 
            margin-top: 35px;
            color: #1a1a1a;
            position: relative;
        }

        .artistic-type::after {
            content: "";
            display: inline-block;
            width: 4px;
            height: 4px;
            background-color: #c9372c;
            border-radius: 50%;
            position: absolute;
            bottom: 8px;
            right: -10px;
        }

        .elegant-nav {
            margin-top: 60px;
            display: flex;
            flex-direction: column; 
            align-items: flex-start; 
            gap: 25px; 
        }

        .elegant-nav a {
            font-family: var(--font-stack);
            font-size: 0.85rem;
            letter-spacing: 0.2em;
            color: var(--text-secondary);
            text-decoration: none;
            position: relative;
            display: flex;
            align-items: center;
            transition: color 0.4s ease, transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .elegant-nav a span {
            font-size: 0.65rem;
            opacity: 0.4;
            margin-right: 20px;
            font-family: "Helvetica Neue", Arial, sans-serif;
            letter-spacing: normal;
        }

        .elegant-nav a:hover, .elegant-nav a.active {
            color: var(--text-primary);
            transform: translateX(12px); 
        }

        .elegant-nav a::before {
            content: '';
            position: absolute;
            left: -20px;
            top: 50%;
            transform: translateY(-50%);
            width: 0;
            height: 1px;
            background-color: var(--text-primary);
            transition: width 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .elegant-nav a:hover::before, .elegant-nav a.active::before {
            width: 12px; 
        }

        .standard-nav {
            display: flex;
            align-items: center;
            margin-bottom: 60px; 
            margin-top: 5vh;    
        }

        .standard-nav a {
            text-decoration: none;
            color: var(--text-secondary);
            margin-right: 35px;
            font-size: 0.9rem;
            position: relative;
            padding-bottom: 6px; 
            transition: color 0.4s ease;
            letter-spacing: 0.05em; 
        }

        .standard-nav a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 1px;
            bottom: 0;
            left: 50%;
            background-color: var(--text-primary);
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            transform: translateX(-50%);
        }

        .standard-nav a:hover, .standard-nav a.active {
            color: var(--text-primary);
        }

        .standard-nav a:hover::after, .standard-nav a.active::after {
            width: 100%; 
        }

        .inner-header {
            display: flex;
            align-items: center; 
            margin-top: 6vh;
            margin-bottom: 60px;
        }

        .home-link {
            color: var(--text-secondary);
            margin-right: 40px; 
            transition: color 0.4s ease, transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .home-link:hover {
            color: var(--text-primary);
            transform: translateY(-2px) scale(1.05);
        }

        .standard-nav {
            display: flex;
            align-items: center;
            margin: 0; 
        }

        .standard-nav a {
            text-decoration: none;
            color: var(--text-secondary);
            margin-right: 35px;
            font-size: 0.9rem;
            position: relative;
            padding-bottom: 6px;
            transition: color 0.4s ease;
            letter-spacing: 0.05em;
        }

        .standard-nav a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 1px;
            bottom: 0;
            left: 50%;
            background-color: var(--text-primary);
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            transform: translateX(-50%);
        }

        .standard-nav a:hover, .standard-nav a.active {
            color: var(--text-primary);
        }

        .standard-nav a:hover::after, .standard-nav a.active::after {
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="brand-header">
            <div class="avatar-wrapper">
                <img src="avatar.jpg" alt="头像" class="avatar-img">
            </div>
            
            <h1 class="signature-text artistic-type">下饭猫的秘密基地</h1>
            
            <nav class="elegant-nav">
                <a href="negative.html"><span>01</span> 广告否词工具-DEMO</a>
                <a href="track.html"><span>02</span> 出单分布/在途库存可视化</a>
                <a href=""><span>03</span> 待上传...</a>
            </nav>
        </header>

        <main>
        </main>
    </div>
</body>
</html>
