<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美国订单/物流监控大屏</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: rgba(11, 15, 25, 0.8); }
        ::-webkit-scrollbar-thumb { background: #2a354d; border-radius: 2px; }
        ::-webkit-scrollbar-thumb:hover { background: #00d2ff; box-shadow: 0 0 10px #00d2ff; }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Consolas, sans-serif; background-color: #05080f; color: #fff; display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { 
            width: 420px; 
            background: 
                linear-gradient(180deg, rgba(17, 24, 39, 0.95) 0%, rgba(8, 12, 20, 0.95) 100%),
                repeating-linear-gradient(0deg, transparent, transparent 19px, rgba(0, 210, 255, 0.03) 20px),
                repeating-linear-gradient(90deg, transparent, transparent 19px, rgba(0, 210, 255, 0.03) 20px);
            padding: 25px 25px; 
            display: flex; flex-direction: column; 
            border-right: 1px solid rgba(0, 210, 255, 0.15); 
            box-shadow: 5px 0 25px rgba(0, 0, 0, 0.9); 
            z-index: 10; overflow-y: auto; position: relative;
        }
        .sidebar::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, #00d2ff, transparent); }

        .sidebar h2 { font-size: 12px; margin-top: 15px; margin-bottom: 12px; color: #00d2ff; display: flex; align-items: center; text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid rgba(0, 210, 255, 0.1); padding-bottom: 8px; }
        .sidebar h2 span { margin-right: 8px; font-size: 14px; filter: drop-shadow(0 0 5px rgba(0,210,255,0.5)); }
        .sidebar p { font-size: 11px; color: #64748b; margin-bottom: 10px; line-height: 1.6; letter-spacing: 0.5px;}


        textarea { 
            width: 100%; height: 110px; 
            background-color: rgba(2, 4, 8, 0.7); border: 1px solid #1f293d; 
            border-left: 3px solid #1f293d; 
            color: #64748b; padding: 12px; font-family: monospace; font-size: 11px; 
            resize: none; border-radius: 2px; margin-bottom: 15px; white-space: pre; overflow-x: auto;
            transition: all 0.3s ease;
        }
        textarea:focus { outline: none; border-color: rgba(0, 210, 255, 0.5); border-left: 3px solid #00ffa2; box-shadow: 0 0 15px rgba(0, 210, 255, 0.1) inset; color: #00ffa2; text-shadow: 0 0 2px rgba(0, 255, 162, 0.3); }
        

        .controls-wrapper {
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            padding-top: 20px;
            border-top: 1px dashed rgba(0, 210, 255, 0.2);
        }


        .tech-btn { position: relative; }
        .tech-btn::after {
            content: attr(data-title); position: absolute; bottom: 120%; left: 50%; transform: translateX(-50%);
            background: rgba(0, 210, 255, 0.1); border: 1px solid #00d2ff; color: #00d2ff;
            padding: 4px 8px; font-size: 10px; white-space: nowrap; letter-spacing: 1px;
            pointer-events: none; opacity: 0; transition: 0.2s; box-shadow: 0 0 10px rgba(0,210,255,0.3);
            font-family: 'Segoe UI', Tahoma, sans-serif; backdrop-filter: blur(4px);
        }
        .tech-btn:hover::after { opacity: 1; bottom: 110%; }


        .btn-generate { 
            flex-grow: 1; height: 50px;
            background: rgba(0, 210, 255, 0.05); color: #00d2ff; 
            border: none;
            font-size: 24px; cursor: pointer; transition: 0.3s;

            clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
            display: flex; justify-content: center; align-items: center;
            position: relative; background-color: rgba(0, 210, 255, 0.1);
        }
        .btn-generate::before {
            content: ''; position: absolute; top: 1px; left: 1px; right: 1px; bottom: 1px;
            background: #080c14; z-index: -1;
            clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
            transition: 0.3s;
        }
        .btn-generate:hover { color: #fff; text-shadow: 0 0 10px #00d2ff; }
        .btn-generate:hover::before { background: rgba(0, 210, 255, 0.2); }


        .toggle-group { display: flex; gap: 10px; }
        .btn-toggle { 
            width: 45px; height: 45px;
            background: transparent; color: #4a5568; 
            border: 1px solid #1f293d; 

            clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px);
            cursor: pointer; font-size: 18px; transition: 0.3s;
            display: flex; justify-content: center; align-items: center;
        }
        .btn-toggle:hover { border-color: #3a4a6b; color: #8fa3b0; }
        .btn-toggle.active { 
            border-color: #00d2ff; color: #00d2ff; 
            background: rgba(0, 210, 255, 0.1);
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.2) inset; 
            text-shadow: 0 0 8px #00d2ff;
        }

  
        .btn-play { 
            width: 45px; height: 45px;
            background: transparent; color: #ff5e62; border: 1px solid #ff5e62; 
            clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px);
            cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center; font-size: 16px;
        }
        .btn-play::after { color: #ff5e62; border-color: #ff5e62; background: rgba(255, 94, 98, 0.1); box-shadow: 0 0 10px rgba(255,94,98,0.3);}
        .btn-play:not(:disabled):hover { 
            background: rgba(255, 94, 98, 0.2); 
            color: #fff; text-shadow: 0 0 10px #ff5e62;
        }
        .btn-play:disabled { border-color: #1f293d; color: #334155; cursor: not-allowed; }

        /* =================================================== */

        .main-content { flex-grow: 1; position: relative; }
        #map-container { width: 100%; height: 100%; background: radial-gradient(circle at center, #0b101d 0%, #05080f 100%);}
        

        .stats { 
            position: absolute; top: 25px; right: 25px; 
            background: rgba(11, 15, 25, 0.7); padding: 20px 25px; 
            border-radius: 4px; border: 1px solid rgba(0, 210, 255, 0.2); 
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            pointer-events: none; backdrop-filter: blur(10px); z-index: 5;
        }
        .stats::before { content: ''; position: absolute; top: -1px; left: -1px; width: 10px; height: 10px; border-top: 2px solid #00d2ff; border-left: 2px solid #00d2ff; }
        .stats::after { content: ''; position: absolute; bottom: -1px; right: -1px; width: 10px; height: 10px; border-bottom: 2px solid #00d2ff; border-right: 2px solid #00d2ff; }
        .stats h3 { margin-bottom: 5px; font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 1px;}
        .stats .number { font-size: 28px; color: #ff5e62; font-weight: bold; margin-bottom: 15px; font-family: Consolas, monospace; text-shadow: 0 0 10px rgba(255,94,98,0.3);}
        .stats .number.fba { color: #00d2ff; margin-bottom: 0; text-shadow: 0 0 10px rgba(0,210,255,0.3);}
    </style>
</head>
<body>

    <div class="sidebar">
        <h2 style="margin-top:0;"><span>▤</span>历史订单</h2>
        <textarea id="salesInput" placeholder="[城市]	[州]&#10;Naknek	AK&#10;Los Angeles	CA&#10;Seattle	WA"></textarea>

        <h2><span>⎈</span>发货计划</h2>
        <textarea id="fbaInput" placeholder="[发货地]	[渠道]	[发货日期]	[运输周期]	[目的州]	[目的城市]	[数量]&#10;Shenzhen	海运	2026-03-01	35	CA	Los Angeles	2000&#10;Shenzhen	空运	2026-03-25	7	TX	Dallas	500&#10;Hongkong	空运	2026-03-28	5	WA	Seattle	300&#10;Yiwu/Ningbo	海运	2026-03-10	40	NY	New York	1200"></textarea>

        <div class="controls-wrapper">
            <button class="btn-generate tech-btn" data-title="INITIALIZE SYSTEM" onclick="parseData()">
                <span>⚡</span>
            </button>
            
            <div class="toggle-group">
                <button id="btnToggleMap" class="btn-toggle tech-btn active" data-title="TOGGLE HEATMAP" onclick="toggleHeatmap()">◈</button>
                <button id="btnToggleRoute" class="btn-toggle tech-btn active" data-title="TOGGLE ROUTE" onclick="toggleRoutes()">✇</button>
                <button id="btnPlayAnimation" class="btn-play tech-btn" data-title="TIMELINE PLAYBACK" onclick="playHeatmapAnimation()" disabled>⏵</button>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="stats">
            <h3>总订单</h3>
            <div class="number" id="totalOrders">0</div>
            <h3>在途库存</h3>
            <div class="number fba" id="totalFba">0</div>
        </div>
        <div id="map-container"></div>
    </div>

    <script>
        const stateMap = { 'AL': 'Alabama', 'AK': 'Alaska', 'AZ': 'Arizona', 'AR': 'Arkansas', 'CA': 'California', 'CO': 'Colorado', 'CT': 'Connecticut', 'DE': 'Delaware', 'FL': 'Florida', 'GA': 'Georgia', 'HI': 'Hawaii', 'ID': 'Idaho', 'IL': 'Illinois', 'IN': 'Indiana', 'IA': 'Iowa', 'KS': 'Kansas', 'KY': 'Kentucky', 'LA': 'Louisiana', 'ME': 'Maine', 'MD': 'Maryland', 'MA': 'Massachusetts', 'MI': 'Michigan', 'MN': 'Minnesota', 'MS': 'Mississippi', 'MO': 'Missouri', 'MT': 'Montana', 'NE': 'Nebraska', 'NV': 'Nevada', 'NH': 'New Hampshire', 'NJ': 'New Jersey', 'NM': 'New Mexico', 'NY': 'New York', 'NC': 'North Carolina', 'ND': 'North Dakota', 'OH': 'Ohio', 'OK': 'Oklahoma', 'OR': 'Oregon', 'PA': 'Pennsylvania', 'RI': 'Rhode Island', 'SC': 'South Carolina', 'SD': 'South Dakota', 'TN': 'Tennessee', 'TX': 'Texas', 'UT': 'Utah', 'VT': 'Vermont', 'VA': 'Virginia', 'WA': 'Washington', 'WV': 'West Virginia', 'WI': 'Wisconsin', 'WY': 'Wyoming' };

        const geoCoordMap = {
            'Los Angeles,CA': [-118.24, 34.05], 'Seattle,WA': [-122.33, 47.60], 'Dallas,TX': [-96.79, 32.77], 'New York,NY': [-74.00, 40.71], 'Chicago,IL': [-87.62, 41.87], 'Miami,FL': [-80.19, 25.76], 'Atlanta,GA': [-84.38, 33.74], 'Houston,TX': [-95.36, 29.76],
            'Alabama': [-86.90, 32.31], 'Alaska': [-152.40, 61.37], 'Arizona': [-111.43, 33.72], 'Arkansas': [-92.37, 34.96], 'California': [-119.41, 36.77], 'Colorado': [-105.31, 39.11], 'Connecticut': [-72.75, 41.59], 'Delaware': [-75.50, 39.31], 'Florida': [-81.51, 27.66], 'Georgia': [-83.64, 32.16], 'Hawaii': [-155.58, 19.89], 'Idaho': [-114.47, 44.06], 'Illinois': [-89.39, 40.63], 'Indiana': [-86.12, 39.84], 'Iowa': [-93.09, 41.87], 'Kansas': [-98.48, 39.01], 'Kentucky': [-84.27, 37.66], 'Louisiana': [-91.86, 31.16], 'Maine': [-69.38, 44.69], 'Maryland': [-76.80, 39.06], 'Massachusetts': [-71.53, 42.23], 'Michigan': [-85.60, 44.18], 'Minnesota': [-93.90, 45.69], 'Mississippi': [-89.65, 32.74], 'Missouri': [-92.28, 38.45], 'Montana': [-109.63, 46.92], 'Nebraska': [-98.26, 41.12], 'Nevada': [-117.05, 38.31], 'New Hampshire': [-71.56, 43.39], 'New Jersey': [-74.40, 40.05], 'New Mexico': [-106.24, 34.30], 'New York': [-75.52, 42.94], 'North Carolina': [-79.80, 35.63], 'North Dakota': [-99.78, 47.52], 'Ohio': [-82.90, 40.38], 'Oklahoma': [-96.92, 35.56], 'Oregon': [-122.07, 43.80], 'Pennsylvania': [-77.19, 41.20], 'Rhode Island': [-71.42, 41.68], 'South Carolina': [-80.94, 33.83], 'South Dakota': [-100.22, 44.29], 'Tennessee': [-86.58, 35.74], 'Texas': [-99.90, 31.96], 'Utah': [-111.86, 39.32], 'Vermont': [-72.71, 44.04], 'Virginia': [-78.16, 37.76], 'Washington': [-120.74, 47.75], 'West Virginia': [-80.45, 38.49], 'Wisconsin': [-89.61, 44.26], 'Wyoming': [-107.29, 42.75]
        };

        let myChart = echarts.init(document.getElementById('map-container'));
        let globalSalesOrder = []; 
        let globalRouteLines = [];
        let globalTransportPoints = [];
        let heatMapMaxVal = 10;
        let isHeatmapVisible = true;
        let isRouteVisible = true;
        let animationTimer = null;

        fetch('https://fastly.jsdelivr.net/gh/apache/echarts-website@asf-site/examples/data/asset/geo/USA.json')
            .then(res => res.json()).then(usaJson => {
                echarts.registerMap('USA', usaJson);
                renderChart([], [], [], []); 
            });

        function renderChart(mapData, routeLines, transportPoints, pingData = []) {
            const option = {
                title: { show: false }, 
                geo: { map: 'USA', roam: true, center: [-108, 38], zoom: 1.15, itemStyle: { areaColor: '#101524', borderColor: '#232d42', borderWidth: 1.2 }, emphasis: { itemStyle: { areaColor: '#1c253d' } }, zlevel: 1 },
                tooltip: { trigger: 'item', backgroundColor: 'rgba(5, 8, 15, 0.95)', borderColor: '#00d2ff', textStyle: { color: '#e2e8f0', fontFamily: 'Consolas, monospace', fontSize: 12 } },
                visualMap: { show: isHeatmapVisible, left: 'right', bottom: '25px', min: 0, max: heatMapMaxVal, inRange: { color: ['#101524', '#3a7bd5', '#00d2ff', '#fddb92', '#ff5e62'] }, text: ['HIGH', 'LOW'], textStyle: { color: '#64748b', fontSize: 10, fontWeight: 'bold' }, calculable: true, seriesIndex: 0 },
                series: [
                    { name: 'Sales', type: 'map', geoIndex: 0, data: isHeatmapVisible ? mapData : [], tooltip: { formatter: p => p.value ? `<span style="color:#00d2ff;">${p.name}</span><br/>Order: <span style="color:#ff5e62">${p.value}</span>` : '' } },
                    { name: 'Route', type: 'lines', zlevel: 2, polyline: true, effect: { show: true, period: 6, trailLength: 0, symbol: 'circle', symbolSize: 3.5 }, lineStyle: { width: 1.5, opacity: 0.35, type: 'dashed' }, data: isRouteVisible ? routeLines : [] },
                    { name: 'Transit', type: 'scatter', coordinateSystem: 'geo', zlevel: 3, label: { show: true, formatter: '{b}', position: 'right', color: '#fff', fontSize: 11, fontFamily: 'Consolas', backgroundColor: 'rgba(5,8,15,0.7)', padding: [3, 6], borderRadius: 2, borderColor: 'rgba(255,255,255,0.1)', borderWidth: 1 }, data: isRouteVisible ? transportPoints : [] },
                    { name: 'Ping', type: 'effectScatter', coordinateSystem: 'geo', zlevel: 4, symbolSize: 15, itemStyle: { color: '#fff', shadowBlur: 10, shadowColor: '#ff5e62' }, rippleEffect: { brushType: 'stroke', scale: 4 }, data: pingData }
                ]
            };
            myChart.setOption(option, { replaceMerge: ['series'] });
        }

        function parseData() {
            clearInterval(animationTimer);
            globalSalesOrder = [];
            const salesLines = document.getElementById('salesInput').value.trim().split('\n');
            if (salesLines.length > 1) {
                let sIndex = salesLines[0].toLowerCase().indexOf('state') > -1 ? salesLines[0].split(/\t|,/).findIndex(h => h.toLowerCase().includes('state')) : 1;
                for (let i = 1; i < salesLines.length; i++) {
                    if (!salesLines[i].trim()) continue;
                    let cols = salesLines[i].split(/\t|,/);
                    if (cols[sIndex]) {
                        let stName = stateMap[cols[sIndex].trim().toUpperCase()] || cols[sIndex].trim().toUpperCase();
                        globalSalesOrder.push(stName);
                    }
                }
            }

            let counts = {};
            globalSalesOrder.forEach(s => counts[s] = (counts[s] || 0) + 1);
            let finalMapData = Object.keys(counts).map(k => ({ name: k, value: counts[k] }));
            heatMapMaxVal = finalMapData.length > 0 ? Math.max(...finalMapData.map(item => item.value)) : 10;
            animateValue("totalOrders", 0, globalSalesOrder.length, 1000);

            const fbaLines = document.getElementById('fbaInput').value.trim().split('\n');
            let totalFbaQty = 0;
            let validRows = [];
            let originNodesMap = {}; 
            globalRouteLines = [];
            globalTransportPoints = [];
            const today = new Date();

            if (fbaLines.length > 1) {
                let headers = fbaLines[0].split(/\t|,/);
                let colMap = { origin:-1, method:-1, date:-1, days:-1, city:-1, state:-1, qty:-1 };
                headers.forEach((h, idx) => {
                    if(h.includes('发货地')||h.includes('起点')||h.includes('Origin')||h.includes('ORIGIN')) colMap.origin = idx;
                    if(h.includes('渠道')||h.includes('空')||h.includes('海')||h.includes('TYPE')) colMap.method = idx;
                    if(h.includes('日期')||h.includes('Date')||h.includes('DATE')) colMap.date = idx;
                    if(h.includes('周期')||h.includes('天')||h.includes('Days')||h.includes('DAYS')) colMap.days = idx;
                    if(h.includes('城市')||h.includes('City')||h.includes('DEST_C')) colMap.city = idx;
                    if(h.includes('州')||h.includes('State')||h.includes('DEST_S')) colMap.state = idx;
                    if(h.includes('数量')||h.includes('Qty')||h.includes('QTY')) colMap.qty = idx;
                });

                for (let i = 1; i < fbaLines.length; i++) {
                    if (!fbaLines[i].trim()) continue;
                    let cols = fbaLines[i].split(/\t|,/);
                    try {
                        let origin = colMap.origin!==-1 && cols[colMap.origin] ? cols[colMap.origin].trim() : 'Unknown';
                        let method = colMap.method!==-1 ? cols[colMap.method].trim() : '海运';
                        let dateStr = colMap.date!==-1 ? cols[colMap.date].trim() : '';
                        let days = colMap.days!==-1 ? parseInt(cols[colMap.days]) : 30;
                        let city = colMap.city!==-1 ? cols[colMap.city].trim() : '';
                        let state = colMap.state!==-1 ? cols[colMap.state].trim() : '';
                        let qty = colMap.qty!==-1 ? parseInt(cols[colMap.qty]) : 0;

                        if(!dateStr || isNaN(qty)) continue;
                        totalFbaQty += qty;

                        let destKey = `${city},${state}`;
                        let targetCoord = geoCoordMap[destKey] || geoCoordMap[stateMap[state] || state];
                        if(!targetCoord) continue;

                        let isAir = method.includes('空') || method.toLowerCase().includes('air');
                        if (!originNodesMap[origin]) originNodesMap[origin] = { name: origin, hasAir: false, hasSea: false };
                        if (isAir) originNodesMap[origin].hasAir = true; else originNodesMap[origin].hasSea = true;

                        validRows.push({ originKey: origin, method, dateStr, days, city, qty, targetCoord, isAir });
                    } catch (e) {}
                }
            }

            let nodeKeys = Object.keys(originNodesMap);
            let step = nodeKeys.length > 1 ? (46 - 22) / (nodeKeys.length - 1) : 0;
            nodeKeys.forEach((key, idx) => { originNodesMap[key].coord = [-142, nodeKeys.length === 1 ? 34 : 46 - (step * idx)]; });

            nodeKeys.forEach(key => {
                let node = originNodesMap[key];
                let nodeColor = (node.hasAir && node.hasSea) ? '#00ffa2' : (node.hasAir ? '#f2a900' : '#00d2ff');
                let iconStr = (node.hasAir && node.hasSea) ? '✈️🚢' : (node.hasAir ? '✈️' : '🚢');
                globalTransportPoints.push({ name: node.name, value: node.coord, symbol: 'circle', symbolSize: 10, itemStyle: { color: nodeColor, shadowBlur: 15, shadowColor: nodeColor, borderColor: '#fff', borderWidth: 2 }, label: { show: true, formatter: `${iconStr} ${node.name}`, position: 'left', color: nodeColor, fontSize: 13, backgroundColor: 'transparent' }});
            });

            validRows.forEach(row => {
                let startCoord = originNodesMap[row.originKey].coord; 
                let color = row.isAir ? '#f2a900' : '#00d2ff'; 
                let shipDate = new Date(row.dateStr);
                let progress = Math.max(0, Math.min(1, ((today - shipDate) / (1000 * 60 * 60 * 24)) / row.days));
                let etaDate = new Date(shipDate); etaDate.setDate(etaDate.getDate() + row.days);
                let cpX = (startCoord[0] + row.targetCoord[0]) / 2 - (row.targetCoord[1] - startCoord[1]) * 0.2;
                let cpY = (startCoord[1] + row.targetCoord[1]) / 2 + (row.targetCoord[0] - startCoord[0]) * 0.2;

                let trackCoords = [];
                for (let i = 0; i <= 50; i++) {
                    let t = i / 50;
                    trackCoords.push([ Math.pow(1-t,2)*startCoord[0] + 2*(1-t)*t*cpX + Math.pow(t,2)*row.targetCoord[0], Math.pow(1-t,2)*startCoord[1] + 2*(1-t)*t*cpY + Math.pow(t,2)*row.targetCoord[1] ]);
                }
                globalRouteLines.push({ coords: trackCoords, lineStyle: { color: color } });
                

                let progressPercent = Math.round(progress * 100);

                globalTransportPoints.push({ 
                    name: `${row.qty}件 ${progressPercent}%`, 
                    value: trackCoords[Math.floor(progress * 50)], 
                    symbol: 'circle', symbolSize: 7, 
                    itemStyle: { color: color, shadowBlur: 8, shadowColor: color }, 
                    info: { type: 'transit', origin: row.originKey, method: row.method, city: row.city, qty: row.qty, date: row.dateStr, eta: etaDate.toISOString().split('T')[0], progress: progress, color: color }
                });
            });

            animateValue("totalFba", 0, totalFbaQty, 1000);
            if(globalSalesOrder.length > 0) document.getElementById('btnPlayAnimation').disabled = false;
            renderChart(finalMapData, globalRouteLines, globalTransportPoints, []);
        }

        function toggleHeatmap() {
            let btn = document.getElementById('btnToggleMap');
            isHeatmapVisible = !isHeatmapVisible;
            isHeatmapVisible ? btn.classList.add('active') : btn.classList.remove('active');
            refreshStaticView();
        }

        function toggleRoutes() {
            let btn = document.getElementById('btnToggleRoute');
            isRouteVisible = !isRouteVisible;
            isRouteVisible ? btn.classList.add('active') : btn.classList.remove('active');
            refreshStaticView();
        }

        function refreshStaticView() {
            clearInterval(animationTimer); 
            let counts = {};
            globalSalesOrder.forEach(s => counts[s] = (counts[s] || 0) + 1);
            let finalMapData = Object.keys(counts).map(k => ({ name: k, value: counts[k] }));
            renderChart(finalMapData, globalRouteLines, globalTransportPoints, []);
            document.getElementById('totalOrders').innerText = globalSalesOrder.length;
        }

        function playHeatmapAnimation() {
            if (globalSalesOrder.length === 0) return;
            clearInterval(animationTimer);
            isHeatmapVisible = true;
            document.getElementById('btnToggleMap').classList.add('active');

            let currentCounts = {};
            let currentIndex = 0;
            let batchSize = Math.max(1, Math.ceil(globalSalesOrder.length / 60)); 

            document.getElementById('totalOrders').innerText = 0;
            renderChart([], globalRouteLines, globalTransportPoints, []);

            animationTimer = setInterval(() => {
                let activeStatesThisFrame = []; 
                for(let i=0; i<batchSize; i++) {
                    if(currentIndex >= globalSalesOrder.length) { clearInterval(animationTimer); break; }
                    let st = globalSalesOrder[currentIndex];
                    currentCounts[st] = (currentCounts[st] || 0) + 1;
                    if(!activeStatesThisFrame.includes(st)) activeStatesThisFrame.push(st); 
                    currentIndex++;
                }

                let currentMapData = Object.keys(currentCounts).map(k => ({ name: k, value: currentCounts[k] }));
                let pingData = activeStatesThisFrame.map(st => {
                    let coord = geoCoordMap[st]; 
                    if (coord) return { value: coord, itemStyle: { color: '#ff5e62' } };
                    return null;
                }).filter(item => item !== null);

                document.getElementById('totalOrders').innerText = currentIndex;
                renderChart(currentMapData, globalRouteLines, globalTransportPoints, pingData);

                if(currentIndex >= globalSalesOrder.length) {
                    setTimeout(() => { renderChart(currentMapData, globalRouteLines, globalTransportPoints, []); }, 500);
                }
            }, 80); 
        }

        function animateValue(id, start, end, duration) {
            if (start === end) return;
            let range = end - start;
            let current = start;
            let increment = end > start ? Math.max(1, Math.floor(range / (duration / 16))) : -1;
            let stepTime = Math.abs(Math.floor(duration / (range / increment)));
            let obj = document.getElementById(id);
            let timer = setInterval(function() {
                current += increment;
                if ((increment > 0 && current >= end) || (increment < 0 && current <= end)) { current = end; clearInterval(timer); }
                obj.innerHTML = current;
            }, stepTime);
        }

        window.addEventListener('resize', () => myChart.resize());
    </script>
</body>
