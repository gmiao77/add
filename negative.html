<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMZ广告否词工具-DEMO</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --bg-color: #FFFFFF;        
            --text-main: #333333;      
            --text-muted: #999999;   
            --border-color: #E6E6E6;   
            --muji-red: #7F0019;    
            --hover-bg: #F9F9F9;  
        }

        body { 
            font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Helvetica, Arial, sans-serif; 
            padding: 60px 20px; 
            max-width: 960px; 
            margin: 0 auto; 
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.8;
            -webkit-font-smoothing: antialiased; 
        }

      
        .header {
            margin-bottom: 60px;
            text-align: center;
        }
        .header h1 { 
            font-weight: 400; 
            font-size: 24px; 
            letter-spacing: 4px; 
            margin-bottom: 12px;
            color: var(--text-main);
        }
        .header p { 
            font-size: 13px; 
            color: var(--text-muted); 
            letter-spacing: 1px;
        }

        .upload-grid { 
            display: flex; 
            gap: 40px; 
            margin-bottom: 40px; 
        }
        

        .upload-area { 
            flex: 1; 
            border: 1px solid var(--border-color); 
            padding: 50px 30px; 
            text-align: center; 
            background-color: var(--bg-color); 
            transition: background-color 0.4s ease; 
        }
        .upload-area:hover { 
            background-color: var(--hover-bg); 
        }
        
        .upload-area h3 { 
            font-size: 14px; 
            font-weight: 500; 
            margin: 0 0 10px 0; 
            letter-spacing: 1px;
        }
        .upload-area p { 
            font-size: 12px; 
            color: var(--text-muted); 
            margin-bottom: 30px; 
        }


        input[type="file"] { 
            display: block; 
            margin: 0 auto; 
            font-size: 12px;
            color: var(--text-muted);
            outline: none;
        }
        input[type="file"]::file-selector-button {
            border: 1px solid var(--text-main);
            background-color: transparent;
            padding: 6px 20px;
            color: var(--text-main);
            cursor: pointer;
            transition: all 0.3s;
            margin-right: 15px;
            font-size: 12px;
            letter-spacing: 1px;
        }
        input[type="file"]::file-selector-button:hover { 
            background-color: var(--text-main); 
            color: var(--bg-color);
        }

        .status-text { 
            display: block;
            font-size: 12px; 
            color: var(--text-muted); 
            margin-top: 20px;
            letter-spacing: 0.5px;
        }

  
        .filter-bar { 
            padding: 20px 0; 
            margin-bottom: 30px; 
            display: flex; 
            align-items: center; 
            gap: 20px; 
            font-size: 13px; 
            border-bottom: 1px solid var(--border-color);
        }
        .filter-bar input { 
            width: 50px; 
            padding: 4px; 
            border: none;
            border-bottom: 1px solid var(--text-main); 
            text-align: center; 
            font-size: 14px; 
            color: var(--text-main);
            outline: none;
            background: transparent;
        }
        
        .btn-text { 
            padding: 6px 15px; 
            background-color: transparent; 
            color: var(--text-main); 
            border: 1px solid var(--text-main); 
            cursor: pointer; 
            font-size: 12px;
            letter-spacing: 1px;
            transition: 0.3s;
        }
        .btn-text:hover { 
            background-color: var(--text-main); 
            color: var(--bg-color);
        }


        table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 10px; 
            font-size: 13px; 
        }
        th, td { 
            border-bottom: 1px solid var(--border-color); 
            padding: 16px 10px; 
            text-align: left; 
        }
        th { 
            color: var(--text-muted); 
            font-weight: 400;
            letter-spacing: 1px;
        }
        td { color: var(--text-main); }
        
        .keyword-text { font-weight: 500; }
        

        .btn-primary { 
            padding: 18px 0; 
            background-color: var(--muji-red); 
            color: #FFFFFF; 
            border: none; 
            cursor: pointer; 
            font-size: 14px; 
            letter-spacing: 2px;
            width: 100%; 
            transition: opacity 0.3s; 
            margin-top: 50px;
        }
        .btn-primary:hover { opacity: 0.85; }
        #exportBtn { display: none; }
        

        .missing-id { color: var(--muji-red); font-size: 11px; display: block; margin-top: 4px; opacity: 0.8;}
        .found-id { color: var(--text-muted); font-size: 11px; display: block; margin-top: 4px;}
        

        input[type="checkbox"] {
            accent-color: var(--text-main);
            width: 14px;
            height: 14px;
            cursor: pointer;
        }

        #summaryText {
            font-size: 13px;
            font-weight: 400;
            color: var(--text-main);
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>AMZ广告否词工具-DEMO</h1>
        <p>不要过度否定，人生也是</p>
    </div>

    <div class="upload-grid">
        <div class="upload-area">
            <h3>1.导入映射关系表</h3>
            <p>需包含4列：广告活动名称-广告活动编号-广告组名称-广告组编号</p>
            <input type="file" id="mappingFileInput" accept=".xlsx, .csv" />
            <span id="mappingStatus" class="status-text">等待读取...</span>
        </div>

        <div class="upload-area">
            <h3>2.导入报告</h3>
            <p>请上传包含搜索词表现的报表</p>
            <input type="file" id="strFileInput" accept=".xlsx, .csv" />
            <span id="strStatus" class="status-text">等待读取...</span>
        </div>
    </div>

    <div id="resultArea">
        <div class="filter-bar">
            <span style="color: var(--text-muted); margin-right: 10px;">过滤参数：</span>
            <span>点击大于 <input type="number" id="minClicks" value="15" min="0"></span>
            <span>订单少于或等于 <input type="number" id="maxOrders" value="0" min="0"></span>
            <button id="applyFilterBtn" class="btn-text">应用</button>
        </div>

        <div id="summaryText"></div>
        <table id="dataTable" style="display:none;">
            <thead>
                <tr>
                    <th style="text-align:center; width: 40px;">选择</th>
                    <th>广告活动</th>
                    <th>广告组</th>
                    <th>搜索词</th>
                    <th>点击</th>
                    <th>订单</th>
                    <th>花费</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
        <button id="exportBtn" class="btn-primary">生成批量否定模板</button>
    </div>

 <script src="ngkw.js"></script>

</body>
</html>
