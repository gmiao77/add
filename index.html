<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMZ广告工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        select { -webkit-appearance: none; -moz-appearance: none; appearance: none; background: transparent; }
    </style>
</head>
<body class="bg-stone-50 min-h-screen text-stone-800 antialiased">
    <div class="container mx-auto px-6 py-12 max-w-4xl">
        <div id="adSystem">
            <header class="mb-12">
                <h1 class="text-3xl font-normal tracking-widest text-stone-900">AMZ广告工具箱</h1>
                <p class="text-sm text-stone-400 mt-2 tracking-wider">批量广告模板生成器</p>
            </header>

            <nav class="flex space-x-10 mb-10 border-b border-stone-200">
                <a href="index.html" class="pb-3 border-b-2 border-red-700 text-stone-900 font-medium tracking-widest text-sm flex items-center transition-colors">
                    广告工具
                </a>
                <a href="about.html" class="pb-3 border-b-2 border-transparent text-stone-400 hover:text-stone-900 tracking-widest text-sm flex items-center transition-colors">
                    关于工具
                </a>
                <a href="negative.html" class="pb-3 border-b-2 border-transparent text-stone-400 hover:text-stone-900 tracking-widest text-sm flex items-center transition-colors">
                    实验阶段
                </a>
            </nav>
    
            <main class="bg-white p-10 border border-stone-200">
                <div class="mb-8 relative">
                    <label class="block text-xs font-bold tracking-widest text-stone-900 mb-3 uppercase">选择策略 / Strategy</label>
                    <div class="relative">
                        <select id="strategySelector" class="w-full px-4 py-3 border-2 border-stone-200 bg-stone-50 text-stone-800 text-sm focus:border-stone-900 focus:bg-white focus:outline-none transition-colors rounded-none cursor-pointer">
                            <option value="">- 请选择您的广告策略 -</option>
                            <option value="strategy1">策略1 - 关键词批量</option>
                            <option value="strategy2">策略2 - ASIN定投</option>
                            <option value="strategy3">策略3 - 批量自动</option>
                            <option value="strategy4">策略4 - 自定义表格</option>
                            <option value="strategy5">策略5 - 批量否定</option>
                            <option value="strategy6">策略6 - 批量SBV</option>
                            <option value="strategy7">策略7 - 群友自定义1</option>
                            <option value="strategy8">策略8 - 群友自定义2</option>
                            <option value="strategy9">策略9 - 群友自定义3-AMC</option>
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-stone-500">
                            <i class="fa fa-angle-down"></i>
                        </div>
                    </div>
                </div>
    
                <div id="strategyContent" class="min-h-[500px] border border-stone-200 bg-stone-50/50 p-6 flex flex-col transition-all">
                    <div class="flex-1 flex flex-col items-center justify-center text-stone-400">
                        <i class="fa fa-cube text-3xl mb-4 opacity-30"></i>
                        <p class="tracking-widest text-sm">等待载入</p>
                    </div>
                </div>
            </main>
        </div>
    
        <script>
            const strategyMap = {
                strategy1: 'strategy1.js',
                strategy2: 'strategy2.js',
                strategy3: 'strategy3.js',
                strategy4: 'strategy4.js',
                strategy5: 'strategy5.js',
                strategy6: 'strategy6.js',
                strategy7: 'strategy7.js',
                strategy8: 'strategy8.js',
                strategy9: 'strategy9.js'
            };
    
            let currentModule = null;
    
            document.getElementById('strategySelector').addEventListener('change', async (e) => {
                const strategyId = e.target.value;
                const container = document.getElementById('strategyContent');
    
                container.innerHTML = '<div class="flex-1 flex flex-col items-center justify-center text-stone-900"><i class="fa fa-circle-o-notch fa-spin text-2xl mb-4"></i><p class="tracking-widest text-sm">处理中...</p></div>';
    
                if (!strategyId) {
                    container.innerHTML = '<div class="flex-1 flex flex-col items-center justify-center text-stone-400"><i class="fa fa-cube text-3xl mb-4 opacity-30"></i><p class="tracking-widest text-sm">等待载入</p></div>';
                    currentModule = null;
                    return;
                }
    
                try {
                    const oldScript = document.getElementById('strategyScript');
                    if (oldScript) oldScript.remove();
    
                    const script = document.createElement('script');
                    script.id = 'strategyScript';
                    script.src = strategyMap[strategyId];
                    script.type = 'module';
    
                    await new Promise((resolve, reject) => {
                        script.onload = resolve;
                        script.onerror = () => reject(new Error('策略加载失败'));
                        document.head.appendChild(script);
                    });
    
                    if (window[strategyId] && typeof window[strategyId].init === 'function') {
                        currentModule = window[strategyId];
                        currentModule.init(container);
                    } else {
                        throw new Error('策略模块格式错误');
                    }
                } catch (error) {
                    container.innerHTML = `<div class="flex-1 flex flex-col items-center justify-center text-red-700 bg-red-50 w-full h-full"><i class="fa fa-exclamation-triangle text-2xl mb-3"></i><p class="tracking-wider text-sm">加载失败: ${error.message}</p></div>`;
                    currentModule = null;
                }
            });
        </script>
    </div>
</body>
</html>
