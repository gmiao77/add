<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMZ广告模板生成工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-4xl">
        <div id="adSystem">
            <header class="mb-4">
                <h1 class="text-2xl font-bold text-gray-800 text-center">AMZ广告模板生成工具</h1>
            </header>

            <nav class="flex justify-center space-x-8 mb-8 border-b border-gray-200">
                <a href="index.html" class="pb-2 px-2 border-b-2 border-indigo-600 text-indigo-600 font-medium flex items-center">
                    <i class="fa fa-wrench mr-2"></i>广告工具
                </a>
                <a href="about.html" class="pb-2 px-2 border-b-2 border-transparent text-gray-500 hover:text-indigo-600 hover:border-indigo-300 transition-all flex items-center">
                    <i class="fa fa-info-circle mr-2"></i>关于工具
                </a>
            </nav>
    
            <main class="bg-white rounded-lg shadow-md p-6">
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-2">选择策略</label>
                    <select id="strategySelector" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500 outline-none">
                        <option value="">请选择策略</option>
                        <option value="strategy1">策略1 - 关键词批量</option>
                        <option value="strategy2">策略2 - ASIN定投</option>
                        <option value="strategy3">策略3 - 批量自动</option>
                        <option value="strategy4">策略4 - 自定义表格</option>
                        <option value="strategy5">策略5 - 批量否定</option>
                        <option value="strategy6">策略6 - 批量SBV</option>
                        <option value="strategy7">策略7 - 群友自定义1</option>
                        <option value="strategy8">策略8 - 群友自定义2</option>
                        <option value="strategy9">策略9 - 群友自定义3-AMC</option>
                    </select>
                </div>
    
                <div id="strategyContent" class="min-h-[500px] border border-gray-200 rounded-lg p-4 bg-gray-50">
                    <div class="flex items-center justify-center h-[500px] text-gray-500">
                        <p>请从上方选择策略</p>
                    </div>
                </div>
            </main>
        </div>
    
        <script>
            // 策略映射逻辑保持不变
            const strategyMap = {
                strategy1: 'strategy1.js',
                strategy2: 'strategy2.js',
                strategy3: 'strategy3.js',
                strategy4: 'strategy4.js',
                strategy5: 'strategy5.js',
                strategy6: 'strategy6.js',
                strategy7: 'strategy7.js',
                strategy8: 'strategy8.js',
                strategy9: 'strategy9.js'
            };
    
            let currentModule = null;
    
            document.getElementById('strategySelector').addEventListener('change', async (e) => {
                const strategyId = e.target.value;
                const container = document.getElementById('strategyContent');
    
                container.innerHTML = '<div class="flex items-center justify-center h-[500px] text-gray-500"><p><i class="fa fa-spinner fa-spin mr-2"></i>加载中...</p></div>';
    
                if (!strategyId) {
                    container.innerHTML = '<div class="flex items-center justify-center h-[500px] text-gray-500"><p>请从上方选择策略</p></div>';
                    currentModule = null;
                    return;
                }
    
                try {
                    const oldScript = document.getElementById('strategyScript');
                    if (oldScript) oldScript.remove();
    
                    const script = document.createElement('script');
                    script.id = 'strategyScript';
                    script.src = strategyMap[strategyId];
                    script.type = 'module';
    
                    await new Promise((resolve, reject) => {
                        script.onload = resolve;
                        script.onerror = () => reject(new Error('策略加载失败'));
                        document.head.appendChild(script);
                    });
    
                    if (window[strategyId] && typeof window[strategyId].init === 'function') {
                        currentModule = window[strategyId];
                        currentModule.init(container);
                    } else {
                        throw new Error('策略模块格式错误');
                    }
                } catch (error) {
                    container.innerHTML = `<div class="flex items-center justify-center h-[500px] text-red-500"><p><i class="fa fa-exclamation-triangle mr-2"></i>加载失败: ${error.message}</p></div>`;
                    currentModule = null;
                }
            });
        </script>
    </div>
</body>
</html>
