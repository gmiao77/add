<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMZ 广告工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #FAFAFA; }
        .sidebar-item { transition: all 0.3s ease; color: #9CA3AF; }
        .sidebar-item.active { color: #000; font-weight: 500; }
        .sidebar-item:hover { color: #000; }
    </style>
</head>

<body class="flex h-screen overflow-hidden">

    <!-- 左侧导航栏 -->
    <nav class="w-64 border-r border-stone-100 p-12 flex flex-col justify-between h-full bg-white/50">
        <div>
            <h1 class="text-lg font-light tracking-[0.2em] text-stone-900 mb-16">AMZ TOOLS</h1>
            <ul id="strategyNav" class="space-y-6 text-sm tracking-widest">
                <li class="sidebar-item cursor-pointer" data-id="strategy1">关键词批量</li>
                <li class="sidebar-item cursor-pointer" data-id="strategy2">ASIN定投</li>
                <li class="sidebar-item cursor-pointer" data-id="strategy3">批量自动</li>
                <li class="sidebar-item cursor-pointer" data-id="strategy4">自定义表格</li>
                <li class="sidebar-item cursor-pointer" data-id="strategy5">批量否定</li>
                <li class="sidebar-item cursor-pointer" data-id="strategy6">批量SBV</li>
                <li class="sidebar-item cursor-pointer" data-id="strategy7">群友自定义1</li>
                <li class="sidebar-item cursor-pointer" data-id="strategy8">群友自定义2</li>
                <li class="sidebar-item cursor-pointer" data-id="strategy9">群友自定义3</li>
            </ul>
        </div>
        <div class="text-[10px] text-stone-300 tracking-[0.2em]">在家剥罗森 © 2026</div>
    </nav>

    <main id="strategyContent" class="flex-1 h-full overflow-y-auto p-16 bg-[#FAFAFA]">
        <div class="max-w-3xl">
            <div class="text-stone-300 font-light italic">请在左侧选择一项策略以开始工作...</div>
        </div>
    </main>

    <script>
        const strategyMap = {
            strategy1: 'strategy1.js', strategy2: 'strategy2.js', strategy3: 'strategy3.js',
            strategy4: 'strategy4.js', strategy5: 'strategy5.js', strategy6: 'strategy6.js',
            strategy7: 'strategy7.js', strategy8: 'strategy8.js', strategy9: 'strategy9.js'
        };

        document.getElementById('strategyNav').addEventListener('click', async (e) => {
            if (e.target.tagName !== 'LI') return;


            document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
            e.target.classList.add('active');

            const strategyId = e.target.dataset.id;
            const container = document.getElementById('strategyContent');
            
            container.innerHTML = '<div class="text-stone-400 animate-pulse">正在载入策略模块...</div>';

            try {
                const oldScript = document.getElementById('strategyScript');
                if (oldScript) oldScript.remove();

                const script = document.createElement('script');
                script.id = 'strategyScript';
                script.src = strategyMap[strategyId];
                script.type = 'module';
                document.head.appendChild(script);

                await new Promise((res, rej) => { script.onload = res; script.onerror = rej; });

                if (window[strategyId]) {
                    window[strategyId].init(container);
                }
            } catch (err) {
                container.innerHTML = '<div class="text-red-400">加载模块失败，请检查文件路径。</div>';
            }
        });
    </script>
</body>
</html>
