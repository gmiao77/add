<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>亚马逊标题字符计算器</title>
    <style>
        /* Modern, clean, analytical styling */
        *, *::before, *::after { box-sizing: border-box; }
        body {
            background-color: #f4f6f8;
            color: #1e293b;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 40px 20px;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
            overflow: hidden;
            border: 1px solid #e2e8f0;
        }
        .header {
            background-color: #f8fafc;
            padding: 30px 40px;
            border-bottom: 1px solid #e2e8f0;
            text-align: center;
        }
        .header h1 {
            font-size: 20px;
            font-weight: 600;
            color: #0f172a;
            margin: 0 0 8px 0;
            letter-spacing: 0.5px;
        }
        .header p {
            font-size: 13px;
            color: #64748b;
            margin: 0;
        }
        .content {
            padding: 40px;
        }
        .input-group {
            margin-bottom: 30px;
        }
        .label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #475569;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        textarea {
            width: 100%;
            height: 120px;
            padding: 16px;
            font-size: 15px;
            font-family: inherit;
            color: #334155;
            background-color: #f8fafc;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            resize: vertical;
            outline: none;
            transition: all 0.2s;
            line-height: 1.5;
        }
        textarea:focus {
            border-color: #94a3b8;
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(226, 232, 240, 0.5);
        }
        .dashboard {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap; /* Added for responsiveness */
        }
        .card {
            flex: 1;
            min-width: 150px; /* Added for responsiveness */
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
        }
        .card-title {
            font-size: 12px;
            color: #64748b;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .card-value {
            font-size: 32px;
            font-weight: 300;
            color: #0f172a;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            line-height: 1;
        }
        .card-value.highlight { color: #dc2626; font-weight: 500;}
        .card-desc {
            font-size: 11px;
            color: #94a3b8;
            margin-top: 8px;
            min-height: 26px;
        }
        .output-group {
            margin-bottom: 20px;
        }
        .optimized-box {
            width: 100%;
            min-height: 80px;
            background-color: #ffffff;
            border: 2px dashed #cbd5e1;
            border-radius: 8px;
            padding: 16px;
            font-size: 15px;
            color: #0f172a;
            line-height: 1.5;
            word-break: break-word;
        }
        .optimized-box.empty {
            color: #94a3b8;
            font-style: italic;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            background-color: #1e293b;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
            text-align: center;
        }
        .btn:hover { background-color: #334155; }
        .btn:active { background-color: #0f172a; }
        
        .anomaly-list {
            margin-top: 20px;
            border-top: 1px solid #e2e8f0;
            padding-top: 20px;
            display: none;
        }
        .anomaly-item {
            font-size: 13px;
            color: #475569;
            background-color: #fff1f2;
            border-left: 3px solid #f43f5e;
            padding: 10px 12px;
            margin-bottom: 8px;
            border-radius: 0 4px 4px 0;
        }
        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 15px;
        }
        .status-safe { background-color: #dcfce7; color: #166534; }
        .status-warn { background-color: #fee2e2; color: #991b1b; }

        @media (max-width: 600px) {
            .dashboard {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>亚马逊标题字符计算器</h1>
    </div>
    
    <div class="content">
        <div class="input-group">
            <label class="label">输入原始标题文案 (包含空格和标点)</label>
            <textarea id="rawInput" placeholder="在此粘贴你的标题" autofocus></textarea>
        </div>

        <div class="dashboard">
            <div class="card">
                <div class="card-title">标准字符 (LEN)</div>
                <div class="card-value" id="charCount">0</div>
                <div class="card-desc">同表格 LEN，包含空格与标点</div>
            </div>
            <div class="card" style="background-color: #f1f5f9;">
                <div class="card-title">底层预估长度</div>
                <div class="card-value" id="byteCount">0</div>
                <div class="card-desc">HTML 转义 & 多字节膨胀后</div>
            </div>
            <div class="card">
                <div class="card-title">隐形差距</div>
                <div class="card-value" id="diffCount">0</div>
                <div class="card-desc">由于转义或特殊符号虚增的额度</div>
            </div>
        </div>

        <div id="statusBadge" class="status-badge status-safe" style="display: none;"></div>

        <div class="output-group">
            <label class="label">智能大写与安全净化输出</label>
            <div id="optimizedOutput" class="optimized-box empty">等待输入...</div>
            <button class="btn" id="copyBtn" style="margin-top: 15px;">复制优化后的标题</button>
        </div>

        <div id="anomalyContainer" class="anomaly-list">
            <!-- Anomaly items injected here -->
        </div>
    </div>
</div>

<script src="title.js"></script>

</body>
</html>
