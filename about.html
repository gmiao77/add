<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>关于 - AMZ广告工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    </style>
</head>
<body class="bg-stone-50 min-h-screen text-stone-800 antialiased">
    <div class="container mx-auto px-6 py-12 max-w-4xl">
        <header class="mb-12">
            <h1 class="text-3xl font-normal tracking-widest text-stone-900">AMZ广告工具箱</h1>
            <p class="text-sm text-stone-400 mt-2 tracking-wider">批量广告模板生成器</p>
        </header>

        <nav class="flex space-x-10 mb-10 border-b border-stone-200">
            <a href="index.html" class="pb-3 border-b-2 border-transparent text-stone-400 hover:text-stone-900 tracking-widest text-sm flex items-center transition-colors">
                广告工具
            </a>
            <a href="about.html" class="pb-3 border-b-2 border-red-700 text-stone-900 font-medium tracking-widest text-sm flex items-center transition-colors">
                关于工具
            </a>
            <a href="negative.html" class="pb-3 border-b-2 border-transparent text-stone-400 hover:text-stone-900 tracking-widest text-sm flex items-center transition-colors">
                实验阶段
            </a>
        </nav>

        <main class="bg-white p-10 border border-stone-200 text-stone-700 leading-relaxed">
            <div class="max-w-2xl">
                <h2 class="text-sm font-bold tracking-widest text-stone-900 mb-6 uppercase">关于本项目</h2>
                <p class="mb-8 text-stone-600 text-justify">
                    解放双手，轻松创建广告。
                </p>
                
                <h3 class="text-sm font-bold tracking-widest text-stone-900 mb-4">核心功能</h3>
                <ul class="space-y-3 mb-12 text-stone-600">
                    <li class="flex items-start">
                        <span class="text-red-700 mr-3 mt-1 text-xs"><i class="fa fa-square"></i></span>
                        支持多种核心策略（关键词、ASIN、自动广告等）
                    </li>
                    <li class="flex items-start">
                        <span class="text-red-700 mr-3 mt-1 text-xs"><i class="fa fa-square"></i></span>
                        *为防关联，生成以后，请手动复制粘贴到从后台下载的空白模板中*
                    </li>
                    <li class="flex items-start">
                        <span class="text-red-700 mr-3 mt-1 text-xs"><i class="fa fa-square"></i></span>
                        纯前端本地运行，保障数据隐私
                    </li>
                    <li class="flex items-start">
                        <span class="text-red-700 mr-3 mt-1 text-xs"><i class="fa fa-square"></i></span>
                        空白模板下载：<a href="https://pan.baidu.com/s/1d7y4wAoKCcjOpkGeaN7CIw?pwd=j3bw" target="_blank" class="text-stone-900 border-b border-stone-900 hover:text-red-700 hover:border-red-700 transition-colors">网盘下载 (非必须)</a>
                    </li>
                </ul>
            </div>

            <div class="mt-12 p-6 bg-stone-900 text-white flex items-start">
                <i class="fa fa-quote-left mt-1 mr-4 text-stone-500 text-lg"></i>
                <p class="text-sm tracking-wide font-light">
                    有任何使用上的问题，或者建议，可随时联系我。
                </p>
            </div>

            <div class="mt-16 pt-12 border-t border-stone-200 flex flex-col items-center">
                <h3 class="text-xs font-bold tracking-widest text-stone-400 mb-8 uppercase">☕ 赞助与支持</h3>
                <div class="p-2 bg-white border border-stone-200 shadow-sm">
                    <img src="pay.jpg" alt="打赏二维码" class="w-40 h-40 object-cover grayscale hover:grayscale-0 transition-all duration-500">
                </div>
                <p class="text-xs text-stone-400 mt-6 tracking-widest flex items-center space-x-4">
                    <span><i class="fa fa-wechat"></i> WECHAT</span>
                    <span class="text-stone-300">|</span>
                    <span><i class="fa fa-alipay"></i> ALIPAY</span>
                </p>
            </div>
        </main>
    </div>
</body>
</html>
